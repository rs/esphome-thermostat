id: fan_page
bg_color: 0x0D1117
widgets:
  - button:
      align: TOP_LEFT
      x: 18
      y: 18
      width: 72
      height: 38
      bg_color: 0x111827
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - lvgl.page.show:
            id: thermostat_page
            animation: MOVE_RIGHT
            time: 200ms
      widgets:
        - label:
            text: "BACK"
            text_font: font_tiny
            align: CENTER
  - label:
      text: "FAN"
      text_font: font_medium
      text_color: 0xE5E7EB
      align: TOP_MID
      y: 22
  - label:
      id: lbl_fan_value
      text: "--"
      text_font: font_small
      text_color: 0x94A3B8
      align: TOP_MID
      y: 62
  - button:
      id: btn_fan_1
      checkable: true
      align: CENTER
      x: -104
      y: -105
      width: 182
      height: 58
      bg_color: 0x111827
      checked:
        bg_color: 0x2095F6
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - homeassistant.action:
            action: climate.set_fan_mode
            data:
              entity_id: ${climate_entity}
              fan_mode: !lambda 'return id(fan_mode_slot_1);'
      widgets:
        - label:
            id: lbl_fan_1_icon
            text: "\U000F0210"
            text_font: font_icon
            align: CENTER
            x: -50
        - label:
            id: lbl_fan_1_value
            text: "--"
            text_font: font_small
            align: CENTER
            x: 24

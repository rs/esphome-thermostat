id: mode_page
bg_color: 0x0D1117
widgets:
  - button:
      align: TOP_LEFT
      x: 18
      y: 18
      width: 72
      height: 38
      bg_color: 0x111827
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - lvgl.page.show:
            id: thermostat_page
            animation: MOVE_RIGHT
            time: 200ms
      widgets:
        - label:
            text: "BACK"
            text_font: font_tiny
            align: CENTER
  - label:
      text: "MODE"
      text_font: font_medium
      text_color: 0xE5E7EB
      align: TOP_MID
      y: 22
  - label:
      id: lbl_mode_value
      text: "--"
      text_font: font_small
      text_color: 0x94A3B8
      align: TOP_MID
      y: 62
  - button:
      id: btn_mode_off
      checkable: true
      align: CENTER
      x: -112
      y: -70
      width: 152
      height: 78
      bg_color: 0x111827
      checked:
        bg_color: 0x606060
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - homeassistant.action:
            action: climate.set_hvac_mode
            data:
              entity_id: ${climate_entity}
              hvac_mode: "off"
      widgets:
        - label:
            text: "\U000F0425"
            text_font: font_icon
            align: CENTER
  - button:
      id: btn_mode_heat
      checkable: true
      align: CENTER
      x: 112
      y: -70
      width: 152
      height: 78
      bg_color: 0x111827
      checked:
        bg_color: 0xFF6F22
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - homeassistant.action:
            action: climate.set_hvac_mode
            data:
              entity_id: ${climate_entity}
              hvac_mode: heat
      widgets:
        - label:
            text: "\U000F0599"
            text_font: font_icon
            align: CENTER
  - button:
      id: btn_mode_cool
      checkable: true
      align: CENTER
      x: -112
      y: 48
      width: 152
      height: 78
      bg_color: 0x111827
      checked:
        bg_color: 0x2095F6
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - homeassistant.action:
            action: climate.set_hvac_mode
            data:
              entity_id: ${climate_entity}
              hvac_mode: cool
      widgets:
        - label:
            text: "\U000F0717"
            text_font: font_icon
            align: CENTER
  - button:
      id: btn_mode_auto
      checkable: true
      align: CENTER
      x: 112
      y: 48
      width: 152
      height: 78
      bg_color: 0x111827
      checked:
        bg_color: 0x10B981
      border_width: 1
      border_color: 0x334155
      radius: 8
      shadow_width: 0
      on_click:
        - homeassistant.action:
            action: climate.set_hvac_mode
            data:
              entity_id: ${climate_entity}
              hvac_mode: heat_cool
      widgets:
        - label:
            text: "\U000F1796"
            text_font: font_icon
            align: CENTER

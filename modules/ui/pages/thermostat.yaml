id: thermostat_page
bg_color: 0x0D1117
widgets:
  - arc:
      id: arc_thermostat
      align: CENTER
      y: -4
      width: 410
      height: 410
      adjustable: true
      value: ${thermostat_default_tenths}
      min_value: ${thermostat_min_tenths}
      max_value: ${thermostat_max_tenths}
      arc_width: 26
      arc_rounded: true
      arc_color: 0x292929
      indicator:
        arc_color: 0xFF6F22
        arc_width: 26
        arc_rounded: true
      knob:
        bg_color: 0xFFFFFF
        border_width: 0
      on_value:
        - if:
            condition:
              lambda: return (int32_t) (millis() - id(dropdown_arc_guard_until_ms)) >= 0;
            then:
              - lambda: |-
                  id(pending_target_temperature) = x / 10.0f;
                  id(optimistic_target_temperature_until_ms) = millis() + 8000;
                  char buf[16];
                  snprintf(buf, sizeof(buf), "%.1f°", id(pending_target_temperature));
                  lv_label_set_text(id(lbl_target_temp), buf);
              - script.execute: refresh_thermostat_arc
      on_release:
        - if:
            condition:
              lambda: return (int32_t) (millis() - id(dropdown_arc_guard_until_ms)) >= 0;
            then:
              - lambda: !include ../../climate/set_optimistic_target_temperature.cpp
              - script.execute: refresh_thermostat_arc
              - script.execute: send_target_temperature
              - script.execute: expire_optimistic_climate_ui
  - arc:
      id: arc_track
      align: CENTER
      y: -4
      width: 410
      height: 410
      adjustable: false
      value: 100
      min_value: 0
      max_value: 100
      arc_width: 26
      arc_rounded: true
      arc_color: 0x0D1117
      indicator:
        arc_color: 0x245D91
        arc_width: 26
        arc_rounded: true
      knob:
        bg_color: 0x0D1117
        border_width: 0
  - arc:
      id: arc_delta
      align: CENTER
      y: -4
      width: 410
      height: 410
      adjustable: false
      value: 100
      min_value: 0
      max_value: 100
      arc_width: 26
      arc_rounded: true
      arc_color: 0x0D1117
      indicator:
        arc_color: 0xFF7626
        arc_width: 26
        arc_rounded: true
      knob:
        bg_color: 0x0D1117
        border_width: 0
  - obj:
      id: obj_current_marker
      align: TOP_LEFT
      x: 0
      y: 0
      width: 14
      height: 14
      radius: 7
      bg_color: 0x6E3517
      border_width: 0
      pad_all: 0
  - obj:
      id: obj_target_marker
      align: TOP_LEFT
      x: 0
      y: 0
      width: 34
      height: 34
      radius: 17
      bg_color: 0xF8FAFC
      border_width: 0
      pad_all: 0
  - label:
      id: lbl_target_temp
      text: "20.0°"
      text_font: font_target
      text_color: 0xFFFFFF
      align: CENTER
      y: -30
  - label:
      text: "ROOM"
      text_font: font_tiny
      text_color: 0x64748B
      align: CENTER
      y: 56
  - label:
      id: lbl_current_temp
      text: "--.-°"
      text_font: font_medium
      text_color: 0xFF6F22
      align: CENTER
      y: 88
  - dropdown:
      id: dd_mode
      align: BOTTOM_MID
      x: -78
      y: -36
      width: 138
      height: 44
      options:
        - AUTO
      selected_text: AUTO
      dir: TOP
      bg_color: 0x111827
      text_font: font_small
      text_color: 0x111827
      border_width: 1
      border_color: 0x475569
      pad_left: 0
      pad_right: 0
      radius: 6
      shadow_width: 0
      dropdown_list:
        bg_color: 0x111827
        text_font: font_small
        text_color: 0xF8FAFC
        border_width: 1
        border_color: 0x475569
        radius: 6
        selected:
          bg_color: 0x2095F6
          text_color: 0xFFFFFF
      widgets:
        - label:
            id: lbl_mode_dropdown_icon
            text: "\U000F1796"
            text_font: font_icon
            text_color: 0xF8FAFC
            align: TOP_LEFT
            x: 14
            y: -4
        - label:
            id: lbl_mode_dropdown_text
            text: "AUTO"
            text_font: font_small
            text_color: 0xF8FAFC
            align: TOP_LEFT
            x: 48
            y: 0
      on_value:
        - lambda: !include ../../climate/set_optimistic_hvac_mode.cpp
        - script.execute: refresh_thermostat_arc
        - script.execute: expire_optimistic_climate_ui
        - if:
            condition:
              lambda: return text == "OFF";
            then:
              - homeassistant.action:
                  action: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: "off"
        - if:
            condition:
              lambda: return text == "HEAT";
            then:
              - homeassistant.action:
                  action: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: heat
        - if:
            condition:
              lambda: return text == "COOL";
            then:
              - homeassistant.action:
                  action: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: cool
        - if:
            condition:
              lambda: return text == "AUTO";
            then:
              - if:
                  condition:
                    lambda: !include ../../climate/should_send_auto_hvac_mode.cpp
                  then:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: auto
                  else:
                    - homeassistant.action:
                        action: climate.set_hvac_mode
                        data:
                          entity_id: ${climate_entity}
                          hvac_mode: heat_cool
        - if:
            condition:
              lambda: return text == "DRY";
            then:
              - homeassistant.action:
                  action: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: dry
        - if:
            condition:
              lambda: return text == "FAN";
            then:
              - homeassistant.action:
                  action: climate.set_hvac_mode
                  data:
                    entity_id: ${climate_entity}
                    hvac_mode: fan_only
  - dropdown:
      id: dd_fan
      align: BOTTOM_MID
      x: 78
      y: -36
      width: 138
      height: 44
      options:
        - AUTO
      selected_text: AUTO
      dir: TOP
      bg_color: 0x111827
      text_font: font_small
      text_color: 0x111827
      border_width: 1
      border_color: 0x475569
      pad_left: 0
      pad_right: 0
      radius: 6
      shadow_width: 0
      dropdown_list:
        bg_color: 0x111827
        text_font: font_small
        text_color: 0xF8FAFC
        border_width: 1
        border_color: 0x475569
        radius: 6
        selected:
          bg_color: 0x2095F6
          text_color: 0xFFFFFF
      widgets:
        - label:
            id: lbl_fan_dropdown_icon
            text: "\U000F0210"
            text_font: font_icon
            text_color: 0xF8FAFC
            align: TOP_LEFT
            x: 14
            y: -4
        - label:
            id: lbl_fan_dropdown_text
            text: "AUTO"
            text_font: font_small
            text_color: 0xF8FAFC
            align: TOP_LEFT
            x: 48
            y: 0
      on_value:
        - lambda: !include ../../climate/set_optimistic_fan_mode.cpp
        - script.execute: expire_optimistic_climate_ui
        - if:
            condition:
              lambda: |-
                if (text == "--") return false;
                std::string value;
                switch (x) {
                  case 0: value = id(fan_mode_slot_1); break;
                  case 1: value = id(fan_mode_slot_2); break;
                  case 2: value = id(fan_mode_slot_3); break;
                  case 3: value = id(fan_mode_slot_4); break;
                  case 4: value = id(fan_mode_slot_5); break;
                  case 5: value = id(fan_mode_slot_6); break;
                  case 6: value = id(fan_mode_slot_7); break;
                  case 7: value = id(fan_mode_slot_8); break;
                  default: return false;
                }
                return !value.empty() && value != "unknown" && value != "unavailable";
            then:
              - homeassistant.action:
                  action: climate.set_fan_mode
                  data:
                    entity_id: ${climate_entity}
                    fan_mode: !lambda |-
                      switch (x) {
                        case 0: return id(fan_mode_slot_1);
                        case 1: return id(fan_mode_slot_2);
                        case 2: return id(fan_mode_slot_3);
                        case 3: return id(fan_mode_slot_4);
                        case 4: return id(fan_mode_slot_5);
                        case 5: return id(fan_mode_slot_6);
                        case 6: return id(fan_mode_slot_7);
                        case 7: return id(fan_mode_slot_8);
                        default: return std::string("");
                      }

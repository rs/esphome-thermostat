# Home Assistant climate bindings and thermostat UI update logic.

globals:
  - id: pending_target_temperature
    type: float
    initial_value: '20.0'
  - id: optimistic_target_temperature_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: optimistic_hvac_mode
    type: std::string
    initial_value: '""'
  - id: optimistic_hvac_mode_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: optimistic_fan_mode
    type: std::string
    initial_value: '""'
  - id: optimistic_fan_mode_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: dropdown_arc_guard_until_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: fan_mode_slot_1
    type: std::string
    initial_value: '"${fan_mode_1}"'
  - id: fan_mode_slot_2
    type: std::string
    initial_value: '"${fan_mode_2}"'
  - id: fan_mode_slot_3
    type: std::string
    initial_value: '"${fan_mode_3}"'
  - id: fan_mode_slot_4
    type: std::string
    initial_value: '"${fan_mode_4}"'
  - id: fan_mode_slot_5
    type: std::string
    initial_value: '"${fan_mode_5}"'
  - id: fan_mode_slot_6
    type: std::string
    initial_value: '""'
  - id: fan_mode_slot_7
    type: std::string
    initial_value: '""'
  - id: fan_mode_slot_8
    type: std::string
    initial_value: '""'

sensor:
  - platform: homeassistant
    id: ha_current_temperature
    entity_id: ${climate_entity}
    attribute: current_temperature
    internal: true
    on_value:
      - script.execute: refresh_climate_ui
  - platform: homeassistant
    id: ha_target_temperature
    entity_id: ${climate_entity}
    attribute: temperature
    internal: true
    on_value:
      - lambda: 'id(optimistic_target_temperature_until_ms) = 0;'
      - script.execute: refresh_climate_ui

text_sensor:
  - platform: homeassistant
    id: ha_climate_state
    entity_id: ${climate_entity}
    internal: true
    on_value:
      - lambda: |-
          id(optimistic_hvac_mode).clear();
          id(optimistic_hvac_mode_until_ms) = 0;
      - script.execute: refresh_climate_ui
  - platform: homeassistant
    id: ha_hvac_action
    entity_id: ${climate_entity}
    attribute: hvac_action
    internal: true
    on_value:
      - script.execute: refresh_climate_ui
  - platform: homeassistant
    id: ha_hvac_modes
    entity_id: ${climate_entity}
    attribute: hvac_modes
    internal: true
    on_value:
      - script.execute: refresh_climate_ui
  - platform: homeassistant
    id: ha_fan_mode
    entity_id: ${climate_entity}
    attribute: fan_mode
    internal: true
    on_value:
      - lambda: |-
          id(optimistic_fan_mode).clear();
          id(optimistic_fan_mode_until_ms) = 0;
      - script.execute: refresh_climate_ui
  - platform: homeassistant
    id: ha_fan_modes
    entity_id: ${climate_entity}
    attribute: fan_modes
    internal: true
    on_value:
      - script.execute: refresh_climate_ui

script:
  - id: refresh_thermostat_arc
    then:
      - lambda: !include refresh_thermostat_arc.cpp
  - id: refresh_climate_ui
    then:
      - lambda: !include refresh_climate_ui.cpp
      - script.execute: refresh_thermostat_arc
  - id: expire_optimistic_climate_ui
    mode: restart
    then:
      - delay: 8s
      - script.execute: refresh_climate_ui
  - id: send_target_temperature
    mode: restart
    then:
      - homeassistant.action:
          action: climate.set_temperature
          data:
            entity_id: ${climate_entity}
            temperature: !lambda |-
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f", id(pending_target_temperature));
              return std::string(buf);
          on_success:
            - lambda: |-
                ESP_LOGI("thermostat", "Sent target %.1f to ${climate_entity}", id(pending_target_temperature));
          on_error:
            - lambda: |-
                ESP_LOGW("thermostat", "Failed to send target %.1f to ${climate_entity}: %s",
                         id(pending_target_temperature), error.c_str());

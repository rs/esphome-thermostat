# Intentionally omit api, wifi, and ota here. Provide them in the parent
# ESPHome config that imports this file as a package.
substitutions:
  name: thermostat
  friendly_name: Thermostat
  climate_entity: climate.living_room
  thermostat_min_tenths: "180"
  thermostat_max_tenths: "320"
  thermostat_default_tenths: "200"
  thermostat_step_tenths: "5"
  fan_mode_1: auto
  fan_mode_2: low
  fan_mode_3: medium
  fan_mode_4: high
  fan_mode_5: "on"
  screen_brightness: "0.90"
  screen_dim_brightness: "0.35"
  base_light_sensor: "none"
  base_thermometer: "none"
  base_light_sensor_id: base_ambient_light
  base_light_sensor_name: "Base Ambient Light"
  base_light_sensor_internal: "true"
  base_thermometer_id: base_thermometer
  base_temperature_sensor_id: base_temperature
  base_temperature_sensor_name: "Base Temperature"
  base_humidity_sensor_id: base_humidity
  base_humidity_sensor_name: "Base Humidity"
  light_sensor_min_brightness: "0.45"
  light_sensor_low_lux: "2.0"
  light_sensor_high_lux: "300.0"
  light_sensor_presence_delta_lux: "35.0"
  light_sensor_presence_delta_ratio: "0.35"
  light_sensor_presence_ignore_after_screen_ms: "3000"
  voice_response_media_players_file: media_players.yaml

packages:
  board: !include "modules/board/module.yaml"
  base: !include "modules/base/module.yaml"
  screen: !include "modules/screen/module.yaml"
  climate: !include "modules/climate/module.yaml"
  voice: !include "modules/voice/module.yaml"
  controls: !include "modules/controls/module.yaml"
  ui: !include "modules/ui/module.yaml"
